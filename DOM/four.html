<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM | four</title>
</head>
<body style="background-color: #212121; color:#fff">
    <ul class="language">
        <li>java Script</li>
    </ul>
</body>
<script>
    function addLanguage(laugName){
        const li =document.createElement('li')
        li.innerHTML=`${laugName}`
        document.querySelector('.language').appendChild(li)
    }
    addLanguage("python")
    addLanguage("HTML")

    function optilanguage(laugName){
        const li = document.createElement('li')
        li.appendChild(document.createTextNode(laugName))
        document.querySelector('.language').appendChild(li)
    }
    optilanguage("java")
    // Edit values 
    const secLung = document.querySelector("li:nth-child(2)")
    <!-- secLung.innerHTML = "mojo" -->

    const newli = document.createElement('li')
    newli.textContent = "pandas"
    secLung.replaceWith(newli)

   //remove

   const lastLung = document.querySelector("li:last-child")
   lastLung.remove()
</script>
</html>
