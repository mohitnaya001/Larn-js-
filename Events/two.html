<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events</title>
</head>
<body>
    <h1>Hi, Mohit</h1>
    <button id="stop">Stop</button>
</body>
<script>
   
    const sayMohit = function(){
        console.log("Hello, Mohit Sir")
    }
    setTimeout(sayMohit,10000)
    const hello = function(){
    document.querySelector('h1').innerHTML= "Hello, Mohit Sir"
}
const changeMe = setTimeout(hello,10000)
document.getElementById('stop').addEventListener('click',function(e){{
    clearTimeout(changeMe)
    console.log('stop')
}})

</script>
</html>
